# =============================================================================
# Darts Kiosk — Build & Release Workflow
# =============================================================================
# Single rule:
#   CI uses the same packaging script as local releases.
#   Source of truth = release/build_release.sh
# =============================================================================

name: Build Release Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Override version (leave empty to use VERSION from repo)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version_override }}" ]; then
            printf '%s\n' "${{ github.event.inputs.version_override }}" > VERSION
          fi
          VERSION=$(tr -d '[:space:]' < VERSION)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Build release artifacts
        run: bash release/build_release.sh

      - name: List generated artifacts
        run: ls -lh release/build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release/build/darts-kiosk-v${{ steps.version.outputs.version }}-windows.zip
            release/build/darts-kiosk-v${{ steps.version.outputs.version }}-linux.tar.gz
            release/build/darts-kiosk-v${{ steps.version.outputs.version }}-source.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
