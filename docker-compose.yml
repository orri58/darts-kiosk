version: '3.8'

services:
  # Darts Kiosk (Backend serves pre-built Frontend)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: darts-kiosk-app
    restart: unless-stopped
    environment:
      - MODE=${MODE:-MASTER}
      - BOARD_ID=${BOARD_ID:-BOARD-1}
      - JWT_SECRET=${JWT_SECRET:-darts-kiosk-jwt-secret-change-this}
      - AGENT_SECRET=${AGENT_SECRET:-agent-secret-change-this}
      - DATABASE_URL=sqlite+aiosqlite:///./data/db/darts.sqlite
      - SYNC_DATABASE_URL=sqlite:///./data/db/darts.sqlite
      - DATA_DIR=/app/data
      - CORS_ORIGINS=*
      - AUTODARTS_URL=${AUTODARTS_URL:-https://play.autodarts.io}
      - AUTODARTS_MOCK=${AUTODARTS_MOCK:-false}
      - CENTRAL_SERVER_URL=${CENTRAL_SERVER_URL:-http://localhost:8002}
      - CENTRAL_ADMIN_PASSWORD=${CENTRAL_ADMIN_PASSWORD:-admin}
      - UPDATE_CHECK_ENABLED=${UPDATE_CHECK_ENABLED:-true}
    volumes:
      - darts_data:/app/data
    ports:
      - "${APP_PORT:-8001}:8001"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - darts-network

  # Nginx Reverse Proxy (Production)
  nginx:
    image: nginx:alpine
    container_name: darts-kiosk-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - darts-network
    profiles:
      - production

volumes:
  darts_data:
    driver: local

networks:
  darts-network:
    driver: bridge
