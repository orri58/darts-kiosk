version: '3.8'

services:
  # Main Application (Backend + Frontend)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: darts-kiosk-app
    restart: unless-stopped
    environment:
      - MODE=${MODE:-MASTER}
      - BOARD_ID=${BOARD_ID:-BOARD-1}
      - JWT_SECRET=${JWT_SECRET:-darts-kiosk-jwt-secret-change-this}
      - AGENT_SECRET=${AGENT_SECRET:-agent-secret-change-this}
      - DATABASE_URL=sqlite+aiosqlite:///data/db.sqlite
      - SYNC_DATABASE_URL=sqlite:///data/db.sqlite
      - DATA_DIR=/data
      - CORS_ORIGINS=*
      - AUTODARTS_URL=${AUTODARTS_URL:-https://play.autodarts.io}
      - AUTODARTS_MOCK=${AUTODARTS_MOCK:-false}
    volumes:
      - darts_data:/data
      - darts_logs:/var/log/darts
    ports:
      - "8001:8001"  # Backend API
      - "3000:3000"  # Frontend (dev mode)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - darts-network

  # Nginx Reverse Proxy (Production)
  nginx:
    image: nginx:alpine
    container_name: darts-kiosk-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - darts-network
    profiles:
      - production

volumes:
  darts_data:
    driver: local
  darts_logs:
    driver: local

networks:
  darts-network:
    driver: bridge
